<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Geotermia — Recursos Interactivos</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d1018;
    --bg2:      #12161e;
    --bg3:      #181c26;
    --border:   #252220;
    --border2:  #332e28;
    --text:     #e8e4d8;
    --muted:    #6a6050;
    --accent:   #c8b89a;
    --amber:    #d09030;
    --sidebar-w: 260px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    height: 48px;
    background: var(--bg2);
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 20;
  }
  .header-title {
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .header-subtitle {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .header-sep {
    width: 0.5px; height: 20px;
    background: var(--border2);
  }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  aside {
    width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar-section {
    padding: 16px 16px 8px;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 0.5px solid var(--border);
  }

  .resource-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    width: 100%;
    padding: 12px 16px;
    background: transparent;
    border: none;
    border-bottom: 0.5px solid var(--border);
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
    font-family: 'Georgia', serif;
  }
  .resource-btn:hover { background: var(--bg3); }
  .resource-btn.active {
    background: var(--bg3);
    border-left: 2px solid var(--amber);
  }
  .resource-btn.active .rb-num { color: var(--amber); }

  .rb-num {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-top: 2px;
    flex-shrink: 0;
    font-family: monospace;
    width: 20px;
  }
  .rb-info { flex: 1; }
  .rb-title {
    font-size: 0.8rem;
    color: var(--accent);
    line-height: 1.3;
    margin-bottom: 3px;
  }
  .rb-desc {
    font-size: 0.68rem;
    color: var(--muted);
    line-height: 1.4;
  }
  .rb-tag {
    display: inline-block;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 3px;
    margin-top: 4px;
    background: rgba(200,184,154,0.08);
    color: var(--muted);
    border: 0.5px solid var(--border2);
  }
  .rb-tag.ready {
    background: rgba(208,144,48,0.1);
    color: #a07828;
    border-color: #4a3810;
  }
  .rb-tag.soon {
    background: rgba(90,84,72,0.12);
    color: #4a4438;
    border-color: #2a2820;
  }

  /* ── MAIN CONTENT ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Welcome screen */
  #welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 2rem;
    text-align: center;
  }
  .welcome-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(208,144,48,0.1);
    border: 0.5px solid #4a3810;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .welcome-title {
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .welcome-body {
    font-size: 0.82rem;
    color: var(--muted);
    max-width: 380px;
    line-height: 1.7;
  }

  /* iframe container -->
  #frame-container {
    flex: 1;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  #frame-container.visible { display: flex; }

  .frame-topbar {
    height: 36px;
    background: var(--bg2);
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 10px;
    flex-shrink: 0;
  }
  .frame-name {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--accent);
  }
  .frame-topbar-sep { flex: 1; }
  .open-tab-btn {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: transparent;
    border: 0.5px solid var(--border2);
    border-radius: 4px;
    padding: 3px 10px;
    cursor: pointer;
    font-family: 'Georgia', serif;
    transition: color 0.15s, border-color 0.15s;
  }
  .open-tab-btn:hover { color: var(--accent); border-color: var(--accent); }

  iframe {
    flex: 1;
    border: none;
    width: 100%;
    background: var(--bg);
  }

  /* ── SCROLLBAR ── */
  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">Geotermia</div>
  </div>
  <div class="header-sep"></div>
  <div class="header-subtitle">recursos interactivos · clase 1</div>
</header>

<div class="layout">

  <!-- ── SIDEBAR ── -->
  <aside>
    <div class="sidebar-section">Recursos</div>

    <!--
      ╔══════════════════════════════════════════╗
      ║  PARA AGREGAR UN NUEVO RECURSO:          ║
      ║  Copiá uno de los bloques de abajo,      ║
      ║  cambiá el id, file, title y desc.       ║
      ╚══════════════════════════════════════════╝
    -->

    <button class="resource-btn"
            onclick="loadResource(this, 'sistema_geotermal_v2.html', 'Formación del reservorio geotérmico')">
      <div class="rb-num">01</div>
      <div class="rb-info">
        <div class="rb-title">Formación del reservorio</div>
        <div class="rb-desc">Estructura terrestre, acuífero, sello y reservorio geotérmico</div>
        <div class="rb-tag ready">disponible</div>
      </div>
    </button>

    <button class="resource-btn"
            onclick="loadResource(this, 'gradiente_termico.html', 'Gradiente térmico terrestre')">
      <div class="rb-num">02</div>
      <div class="rb-info">
        <div class="rb-title">Gradiente térmico</div>
        <div class="rb-desc">Variación de temperatura según contexto tectónico</div>
        <div class="rb-tag soon">próximamente</div>
      </div>
    </button>

    <button class="resource-btn"
            onclick="loadResource(this, 'pozo_geotermal.html', 'Pozo geotérmico')">
      <div class="rb-num">03</div>
      <div class="rb-info">
        <div class="rb-title">Pozo geotérmico</div>
        <div class="rb-desc">Perforación del sello, extracción y aprovechamiento del fluido</div>
        <div class="rb-tag soon">próximamente</div>
      </div>
    </button>

    <!-- 
      PLANTILLA PARA NUEVO RECURSO — descomentá y completá:

    <button class="resource-btn"
            onclick="loadResource(this, 'nombre_archivo.html', 'Título del recurso')">
      <div class="rb-num">04</div>
      <div class="rb-info">
        <div class="rb-title">Título del recurso</div>
        <div class="rb-desc">Descripción breve del contenido</div>
        <div class="rb-tag ready">disponible</div>
      </div>
    </button>
    -->

  </aside>

  <!-- ── MAIN ── -->
  <main>

    <!-- Welcome -->
    <div id="welcome">
      <div class="welcome-icon">♨</div>
      <div class="welcome-title">Clase 1 · Sistemas Geotérmicos</div>
      <div class="welcome-body">
        Seleccioná un recurso del panel izquierdo para comenzar.<br>
        Cada recurso es un diagrama interactivo con animaciones paso a paso.
      </div>
    </div>

    <!-- Frame container -->
    <div id="frame-container">
      <div class="frame-topbar">
        <div class="frame-name" id="frameName">—</div>
        <div class="frame-topbar-sep"></div>
        <button class="open-tab-btn" onclick="openInTab()">abrir en nueva pestaña ↗</button>
      </div>
      <iframe id="resourceFrame" src="" title="Recurso interactivo"></iframe>
    </div>

  </main>
</div>

<script>
  let currentFile = '';

  function loadResource(btn, file, title) {
    // mark active
    document.querySelectorAll('.resource-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    currentFile = file;
    document.getElementById('frameName').textContent = title;
    document.getElementById('resourceFrame').src = file;

    document.getElementById('welcome').style.display = 'none';
    document.getElementById('frame-container').classList.add('visible');
  }

  function openInTab() {
    if (currentFile) window.open(currentFile, '_blank');
  }
</script>

</body>
</html>
